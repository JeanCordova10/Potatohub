version: "3.8"

services:
  mongo:
    image: mongo:7.0
    container_name: ph_local_mongo
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand({ ping: 1 }).ok\" localhost:27017/admin | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  neo4j:
    image: neo4j:5.18
    container_name: ph_local_neo4j
    environment:
      NEO4J_AUTH: neo4j/potatohub123
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474/browser/ | grep -i neo4j"]
      interval: 15s
      timeout: 5s
      retries: 15

volumes:
  mongo_data:
  neo4j_data:
